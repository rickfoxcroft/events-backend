openapi: 3.0.3
info:
  title: Event Venue Booking API
  description: API for searching event venues and booking slots.
  version: 1.0.0
paths:
  /venues:
    get:
      summary: List all venues
      responses:
        '200':
          description: A list of venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Venue'
    post:
      summary: Create a new venue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenueInput'
      responses:
        '201':
          description: Created
  /bookings:
    post:
      summary: Book a slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
      responses:
        '201':
          description: Booking successful
components:
  schemas:
    Venue:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        location:
          type: string
        capacity:
          type: integer
        owner_id:
          type: string
    VenueInput:
      type: object
      required: [name, location, capacity]
      properties:
        name:
          type: string
        location:
          type: string
        capacity:
          type: integer
    BookingInput:
      type: object
      required: [venue_id, start_time, end_time]
      properties:
        venue_id:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
