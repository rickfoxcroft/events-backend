[tools]
rust = { version = "stable", targets = ["wasm32-unknown-unknown"] }
rust-analyzer = "latest"
node = "lts"
"npm:wrangler" = "latest"
"cargo:worker-build" = "latest"
"npm:@typespec/compiler" = "latest"

[tasks."setup"]
description = "Install project dependencies and setup hooks"
run = "echo 'Tools are managed by mise' && ./scripts/setup-hooks.sh"

[tasks."codegen"]
description = "Generate Rust DTOs and Frontend Types from TypeSpec"
run = """
tsp compile api.tsp
npm run codegen:types --workspace=web
"""

[tasks."check:codegen"]
description = "Verify that generated code matches api.tsp"
run = "mise run codegen && git diff --exit-code"

[tasks."build:backend"]
description = "Build the worker"
dir = "packages/backend"
run = "worker-build --release"

[tasks."build:frontend"]
description = "Build the web app"
run = "npm run build --workspace=web"

[tasks."build"]
description = "Build everything"
depends = ["build:backend", "build:frontend"]

[tasks."test"]
description = "Run backend tests"
dir = "packages/backend"
run = "cargo test"

[tasks."ci"]
description = "Run all CI checks"
depends = ["setup", "check:codegen", "lint", "test"]

[tasks."lint"]
description = "Run clippy and rustfmt"
run = "cargo clippy --all-targets -- -D warnings && cargo fmt --check"

[tasks."dev:backend"]
description = "Run the worker locally"
dir = "packages/backend"
run = "wrangler dev"

[tasks."dev:frontend"]
description = "Run the web app locally"
run = "npm run dev --workspace=web"

[tasks."dev"]
description = "Run everything locally"
run = """
mise run dev:backend &
mise run dev:frontend
wait
"""

[tasks."deploy:backend"]
description = "Deploy the worker to Cloudflare"
dir = "packages/backend"
run = "wrangler deploy --env production"

[tasks."deploy:frontend"]
description = "Deploy the web app to Cloudflare Pages"
dir = "packages/web"
run = "npx wrangler pages deploy dist"

[tasks."deploy"]
description = "Deploy everything"
depends = ["deploy:backend", "deploy:frontend"]

[tasks."db:migrate:local"]
description = "Apply D1 schema locally"
dir = "packages/backend"
run = "wrangler d1 execute event-app-db --local --file=schema.sql --yes"

[tasks."db:migrate:remote"]
description = "Apply D1 schema to production"
dir = "packages/backend"
run = "wrangler d1 execute event-app-db --remote --file=schema.sql --yes --env production"
