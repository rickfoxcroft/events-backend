name = "event-app-backend"
main = "src/lib.rs"
compatibility_date = "2024-04-03"

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "event-app-db"
database_id = "your-production-database-id-here"

[[d1_databases]]
binding = "DB"
database_name = "event-app-db"
database_id = "your-local-database-id-here"

[build]
command = "worker-build --release"
