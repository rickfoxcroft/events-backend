name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: local
      CF_ACCOUNT_ID: local-account-id
      CF_IMAGES_API_TOKEN: local-token
      CF_IMAGES_ACCOUNT_HASH: local-account-hash
      PUBLIC_API_URL: http://localhost:8787
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: Initialize Local DB
        run: mise run db:migrate:local

      - name: Create Backend Config for CI
        run: |
          echo "CF_ACCOUNT_ID=local-account-id" > packages/backend/.dev.vars
          echo "CF_IMAGES_API_TOKEN=local-token" >> packages/backend/.dev.vars
          echo "CF_IMAGES_ACCOUNT_HASH=local-account-hash" >> packages/backend/.dev.vars

      - name: Start Backend Local Server
        run: ENVIRONMENT=local mise run dev:backend &

      - name: Wait for Backend Server
        run: |
          timeout 120s bash -c 'until curl -s http://localhost:8787/ > /dev/null; do echo "Waiting for server..."; sleep 5; done'

      - name: Run CI (Lint, Unit & E2E Tests)
        run: mise run ci

      - name: Build Frontend
        run: mise run build:frontend

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    env:
      PUBLIC_API_URL: https://event-app-backend.rickfoxcroft.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Deploy Everything
        run: mise run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
